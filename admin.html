<style>
:root{--gold:#C9A84C;--gold-light:#E8C97A;--deep:#0A0612;--surface:#130D2A;--surface2:#1C1438;--text:#F0EAD6;--text-muted:#A89CC0;--border:rgba(201,168,76,0.25);--red:#c0392b;--green:#1a7a4a;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--deep);color:var(--text);font-family:'Montserrat',sans-serif;font-weight:300;min-height:100vh;}
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--gold);letter-spacing:0.2em;margin-bottom:0.5rem;}
.login-sub{font-size:0.65rem;color:var(--text-muted);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:3rem;}
.login-box{width:100%;max-width:320px;background:var(--surface);border:0.5px solid var(--border);padding:2rem;}
.login-label{font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.5rem;display:block;}
.login-input{width:100%;background:var(--surface2);border:0.5px solid var(--border);color:var(--text);padding:0.9rem 1rem;font-family:'Montserrat',sans-serif;font-size:0.9rem;outline:none;margin-bottom:1rem;-webkit-text-security:disc;}
.login-btn{width:100%;padding:0.9rem;background:none;border:1px solid var(--gold);color:var(--gold);font-family:'Montserrat',sans-serif;font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;}
.login-btn:active{background:var(--gold);color:var(--deep);}
.login-error{font-size:0.7rem;color:#e74c3c;margin-top:0.5rem;display:none;text-align:center;}
#panel-screen{display:none;min-height:100vh;}
.panel-header{background:var(--surface);border-bottom:0.5px solid var(--border);padding:1rem 1.2rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10;}
.panel-title{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--gold);letter-spacing:0.1em;}
.panel-logout{font-size:0.6rem;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;background:none;border:0.5px solid var(--border);padding:0.35rem 0.7rem;cursor:pointer;font-family:'Montserrat',sans-serif;}
.panel-tabs{display:flex;border-bottom:0.5px solid var(--border);background:var(--surface);}
.tab-btn{flex:1;padding:0.8rem;font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;background:none;border:none;color:var(--text-muted);cursor:pointer;font-family:'Montserrat',sans-serif;border-bottom:2px solid transparent;transition:all 0.2s;}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab-badge{display:inline-block;background:var(--gold);color:var(--deep);font-size:0.55rem;padding:0.1rem 0.4rem;border-radius:10px;margin-left:0.3rem;font-weight:500;}
.panel-body{padding:1rem;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.request-card{background:var(--surface);border:0.5px solid var(--border);padding:1.2rem;margin-bottom:1rem;position:relative;}
.request-card.approved{border-color:var(--green);opacity:0.6;}
.request-card.rejected{border-color:var(--red);opacity:0.6;}
.req-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.8rem;}
.req-name{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--gold);}
.req-time{font-size:0.6rem;color:var(--text-muted);}
.req-row{display:flex;gap:0.5rem;margin-bottom:0.4rem;align-items:flex-start;}
.req-label{font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);min-width:70px;padding-top:1px;}
.req-val{font-size:0.75rem;color:var(--text);flex:1;word-break:break-all;}
.req-service{color:var(--gold-light);}
.req-comprobante{margin-top:0.8rem;}
.comp-img{width:100%;max-height:200px;object-fit:contain;border:0.5px solid var(--border);background:var(--surface2);cursor:pointer;}
.comp-text{font-size:0.72rem;color:var(--text-muted);background:var(--surface2);padding:0.6rem;border:0.5px solid var(--border);line-height:1.6;}
.req-actions{display:flex;gap:0.8rem;margin-top:1rem;}
.btn-approve{flex:1;padding:0.8rem;background:var(--green);border:none;color:#fff;font-family:'Montserrat',sans-serif;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;border-radius:2px;}
.btn-approve:active{opacity:0.8;}
.btn-reject{flex:1;padding:0.8rem;background:none;border:1px solid var(--red);color:var(--red);font-family:'Montserrat',sans-serif;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;}
.btn-reject:active{background:var(--red);color:#fff;}
.status-badge{position:absolute;top:0.8rem;right:0.8rem;font-size:0.58rem;letter-spacing:0.1em;padding:0.2rem 0.6rem;border-radius:2px;}
.badge-approved{background:rgba(26,122,74,0.2);color:#4caf84;border:0.5px solid var(--green);}
.badge-rejected{background:rgba(192,57,43,0.2);color:#e57373;border:0.5px solid var(--red);}
.badge-pending{background:rgba(201,168,76,0.1);color:var(--gold);border:0.5px solid var(--border);}
.empty-state{text-align:center;padding:3rem 1rem;}
.empty-icon{font-family:'Cormorant Garamond',serif;font-size:2.5rem;color:rgba(201,168,76,0.2);margin-bottom:1rem;}
.empty-text{font-size:0.75rem;color:var(--text-muted);}
.code-card{background:var(--surface);border:0.5px solid var(--border);padding:1rem;margin-bottom:0.8rem;}
.code-val{font-family:monospace;font-size:1rem;color:var(--gold);letter-spacing:0.15em;margin:0.5rem 0;}
.code-meta{font-size:0.65rem;color:var(--text-muted);}
.code-used{opacity:0.4;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;margin-bottom:1.5rem;}
.stat-box{background:var(--surface);border:0.5px solid var(--border);padding:1rem;text-align:center;}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--gold);}
.stat-label{font-size:0.6rem;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;margin-top:0.2rem;}
.img-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:100;align-items:center;justify-content:center;}
.img-modal.open{display:flex;}
.img-modal img{max-width:95vw;max-height:90vh;object-fit:contain;}
.img-modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer;}
.refresh-btn{width:100%;padding:0.7rem;background:none;border:0.5px solid var(--border);color:var(--text-muted);font-family:'Montserrat',sans-serif;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;margin-bottom:1rem;}
.refresh-btn:active{border-color:var(--gold);color:var(--gold);}
.sending-msg{font-size:0.7rem;color:var(--gold);text-align:center;margin-top:0.5rem;display:none;}
.validate-section{background:var(--surface);border:0.5px solid var(--border);padding:1.2rem;margin-bottom:1rem;}
.validate-title{font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.8rem;}
.validate-row{display:flex;gap:0.5rem;}
.validate-input{flex:1;background:var(--surface2);border:0.5px solid var(--border);color:var(--text);padding:0.8rem 1rem;font-family:'Montserrat',sans-serif;font-size:0.85rem;font-weight:500;letter-spacing:0.1em;outline:none;text-transform:uppercase;}
.validate-btn{padding:0.8rem 1.2rem;background:none;border:1px solid var(--gold);color:var(--gold);font-family:'Montserrat',sans-serif;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;white-space:nowrap;}
.validate-btn:active{background:var(--gold);color:var(--deep);}
.validate-result{margin-top:0.8rem;font-size:0.75rem;padding:0.7rem;display:none;}
.validate-ok{background:rgba(26,122,74,0.15);border:0.5px solid var(--green);color:#4caf84;}
.validate-fail{background:rgba(192,57,43,0.15);border:0.5px solid var(--red);color:#e57373;}
</style>
</head>

<div id="login-screen">

      <input type="text" name="username" value="viajero" autocomplete="username" style="display:none">

      <input class="login-input" type="password" id="pwd-input" name="password" placeholder="••••••••" autocomplete="current-password">
      <button type="submit" class="login-btn">Entrar</button>

    <div class="login-error" id="login-error">Contraseña incorrecta</div>

</div>
